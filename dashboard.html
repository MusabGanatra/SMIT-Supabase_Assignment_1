<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Dashboard</h1>

        <h3 id="userEmail"></h3>

        <input type="text" id="noteInput" placeholder="Enter Note">

        <button onclick="addNote()">
            Add Note
        </button>

        <div id="notes"></div>

        <button onclick="logout()">
            Logout
        </button>

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = "https://mfwcibpbeqqtgbyyught.supabase.co";
    const supabaseKey = "sb_publishable_NvwPu7CHkFZkr45OyUO8oQ_FcY54C17";

    const supabaseClient = supabase.createClient(
        supabaseUrl,
        supabaseKey
    );

    async function checkUser() {

        const {
            data: { session }
        } = await supabaseClient.auth.getSession();

        if (!session) {
            window.location.href = "index.html";
            return;
        }

        const {
            data: { user }
        } = await supabaseClient.auth.getUser();

        document.getElementById("userEmail").innerText = user.email;
        loadNotes();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    async function addNote() {

        const text =
            document.getElementById("noteInput").value;

        const { error } =
            await supabaseClient
                .from("notes")
                .insert([
                    { text }
                ]);

        if (error) {
            alert(error.message);
            return;
        }

        loadNotes();
    }

    async function loadNotes() {

        const { data, error } =
            await supabaseClient
                .from("notes")
                .select("*");

        let html = "";

        data.forEach(note => { html += `<p>${note.text}</p>`; });

        document.getElementById("notes").innerHTML = html;

    }

    checkUser();
</script>

</html>
