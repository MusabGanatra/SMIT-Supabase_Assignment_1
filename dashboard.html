<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <nav class="navbar">

        <h2>📝 Notes App</h2>

        <div>
            <span id="userEmail"></span>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>
            <button onclick="toggleDarkMode()">
                🌙
            </button>
        </div>

    </nav>

    <div class="container">

        <input type="text" id="searchInput" placeholder="Search Notes..." onkeyup="searchNotes()">

        <select id="category">
            <option>Personal</option>
            <option>Work</option>
            <option>Study</option>
            <option>Important</option>
        </select>

        <input type="text" id="noteInput" placeholder="Enter Note">

        <button onclick="addNote()">
            Add Note
        </button>

        <div id="notes"></div>

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = "https://mfwcibpbeqqtgbyyught.supabase.co";
    const supabaseKey = "sb_publishable_NvwPu7CHkFZkr45OyUO8oQ_FcY54C17";

    const supabaseClient = supabase.createClient(
        supabaseUrl,
        supabaseKey
    );

    function toggleDarkMode() {

        document.body.classList.toggle("dark");

        localStorage.setItem(
            "darkMode",
            document.body.classList.contains("dark")
        );
    }

    if (
        localStorage.getItem("darkMode")
        === "true"
    ) {
        document.body.classList.add("dark");
    }

    async function checkUser() {

        const {
            data: { session }
        } = await supabaseClient.auth.getSession();

        if (!session) {
            window.location.href = "index.html";
            return;
        }

        const {
            data: { user }
        } = await supabaseClient.auth.getUser();

        document.getElementById("userEmail").innerText = user.email;
        loadNotes();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    function searchNotes() {

        const search =
            document.getElementById("searchInput")
                .value
                .toLowerCase();

        const cards =
            document.querySelectorAll(".note-card");

        cards.forEach(card => {

            const text =
                card.innerText.toLowerCase();

            if (text.includes(search)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }

        });
    }

    async function addNote() {

        const category = document.getElementById("category").value;

        const text = document.getElementById("noteInput").value;

        const {
            data: { user }
        } = await supabaseClient.auth.getUser();

        const { error } =
            await supabaseClient
                .from("notes")
                .insert([
                    {
                        text: text,
                        category: category,
                        user_id: user.id
                    }
                ]);

        if (error) {
            alert(error.message);
            return;
        }

        document.getElementById("noteInput").value = "";

        loadNotes();
    }

    async function loadNotes() {

        const {
            data: { user }
        } = await supabaseClient.auth.getUser();

        const { data, error } =
            await supabaseClient
                .from("notes")
                .select("*")
                .eq("user_id", user.id)
                .order("created_at", { ascending: false });


        if (error) {
            alert(error.message);
            return;
        }

        let html = "";

        data.forEach(note => {
            html +=
            `<div class="note-card">
            <p>
                ${note.text}
            </p>

            <p>
                📂 ${note.category}
            </p>

            <small>
                ${new Date(note.created_at).toLocaleString()}
            </small>

            <br><br>

            <button onclick="editNote('${note.id}')">
             ✏ Edit
            </button>

            <button onclick="deleteNote('${note.id}')">
                🗑 Delete
            </button>

        </div>`;
        });

        document.getElementById("notes").innerHTML = html;
    }

    async function deleteNote(id) {

        const confirmDelete =
            confirm("Are you sure you want to delete this note?");

        if (!confirmDelete) {
            return;
        }

        await supabaseClient
            .from("notes")
            .delete()
            .eq("id", id);

        loadNotes();
    }

    async function editNote(id) {

        const newText =
            prompt("Enter new note");

        if (!newText) return;

        await supabaseClient
            .from("notes")
            .update({
                text: newText
            })
            .eq("id", id);

        loadNotes();
    }

    checkUser();
</script>

</html>
